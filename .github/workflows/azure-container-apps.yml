name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-tender-prod
  ACR_NAME: acrtender38098
  ACR_LOGIN_SERVER: acrtender38098.azurecr.io
  BACKEND_APP_NAME: tender-backend
  PARSER_APP_NAME: tender-parser
  FRONTEND_APP_NAME: tender-frontend
  BACKEND_URL: https://tender-backend.greencliff-036e8698.polandcentral.azurecontainerapps.io
  RAG_URL: https://tender-rag.greencliff-036e8698.polandcentral.azurecontainerapps.io

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push backend
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/tender-backend:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/tender-backend:latest \
            ./tenderai
          docker push ${{ env.ACR_LOGIN_SERVER }}/tender-backend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/tender-backend:latest

      - name: Build and push parser
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/tender-parser:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/tender-parser:latest \
            ./parser
          docker push ${{ env.ACR_LOGIN_SERVER }}/tender-parser:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/tender-parser:latest

      - name: Build and push frontend
        run: |
          docker build \
            --build-arg VITE_BACK_API=${{ env.BACKEND_URL }} \
            --build-arg VITE_LOCAL_API=${{ env.BACKEND_URL }} \
            --build-arg VITE_RAG_API=${{ env.RAG_URL }} \
            --build-arg VITE_FETCH_DOCUMENT_PROXY_URL=${{ env.BACKEND_URL }}/api/v1/fetch-document \
            -t ${{ env.ACR_LOGIN_SERVER }}/tender-frontend:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/tender-frontend:latest \
            ./tenderflow-admin
          docker push ${{ env.ACR_LOGIN_SERVER }}/tender-frontend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/tender-frontend:latest

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/tender-backend:${{ github.sha }}

      - name: Update parser Container App
        run: |
          az containerapp update \
            --name ${{ env.PARSER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/tender-parser:${{ github.sha }}

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/tender-frontend:${{ github.sha }}
