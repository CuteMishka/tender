name: Parser Cron

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: parser-cron
  cancel-in-progress: false

jobs:
  parser:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: parser

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('parser/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run parser once
        env:
          DATABASE_URL: ${{ secrets.PARSER_DATABASE_URL }}
          RAG_API_BASE: ${{ secrets.RAG_API_BASE }}
          DICTIONARIES_API_URL: ${{ secrets.DICTIONARIES_API_URL }}
          POLL_INTERVAL_SECONDS: "1800"
          MAX_WORKERS: "4"
          HEADLESS: "true"
          DOWNLOAD_DIR: "./downloads"
          STRICT_KEYWORD_FILTER: "false"
          COLLECT_ALL_ACTIVE_LOTS: "true"
          SMART_MATCH_ENABLED: "true"
          SMART_MATCH_USE_MORPHOLOGY: "true"
          SEMANTIC_MATCH_ENABLED: "false"
          AI_LOT_FILTER_ENABLED: "false"
          STOP_AT_FIRST_SEEN_LOT: "false"
          PROCESS_EXISTING_LOTS: "true"
          MAX_LOTS_PER_CYCLE: "0"
          PLATFORMS: "zakup"
          DEFAULT_KEYWORDS: ""
          OUR_BINS: ${{ secrets.OUR_BINS }}
          ZAKUP_PUBLIC_BASE_URL: "https://zakup.gov.kz"
          ZAKUP_LOTS_URL: "https://zakup.gov.kz/home/lots"
          ZAKUP_LOTS_LIMIT: "100"
          ZAKUP_LOTS_MAX_PAGES: "0"
          ZAKUP_LOTS_SYSTEM_IDS: "1__2__3"
          GOSZAKUP_OWS_TOKEN: ""
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
        run: python main.py --once
