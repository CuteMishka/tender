services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tender}
      POSTGRES_DB: ${POSTGRES_DB:-tender}
    volumes:
      - tender_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tender} -d ${POSTGRES_DB:-tender}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rag-db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${RAG_POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${RAG_POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${RAG_POSTGRES_DB:-rag}
    volumes:
      - rag_postgres_data:/var/lib/postgresql/data
      - ./tender-rag/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${RAG_POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAG_POSTGRES_USER:-rag} -d ${RAG_POSTGRES_DB:-rag}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./tenderai
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.io,https://proxy.golang.org,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.org}
    restart: unless-stopped
    environment:
      PORT: 8082
      DATABASE_URL: host=postgres user=${POSTGRES_USER:-tender} password=${POSTGRES_PASSWORD:-tender} dbname=${POSTGRES_DB:-tender} port=5432 sslmode=disable TimeZone=Asia/Almaty
      TENDERPLUS_URL: ${TENDERPLUS_URL:-https://api.tenderplus.kz/graphql}
      TENDERPLUS_TOKEN: ${TENDERPLUS_TOKEN:-}
      TENDERS_KEYWORDS: ${TENDERS_KEYWORDS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173}
      FETCH_DOCUMENT_ALLOWED_HOSTS: ${FETCH_DOCUMENT_ALLOWED_HOSTS:-v3bl.goszakup.gov.kz,goszakup.gov.kz,zakup.gov.kz,ows.goszakup.gov.kz}
      PARSER_POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-1800}
    ports:
      - "${BACKEND_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  rag-api:
    build:
      context: ./tender-rag
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${RAG_POSTGRES_USER:-rag}:${RAG_POSTGRES_PASSWORD:-rag}@rag-db:5432/${RAG_POSTGRES_DB:-rag}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      FILES_DIR: /files
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-gemini-2.5-flash}
      COMPANY_PROFILE: ${COMPANY_PROFILE:-}
      COMPANY_PROFILE_FILE: ${COMPANY_PROFILE_FILE:-/files/company_profile.txt}
    volumes:
      - ./tender-rag/files:/files:ro
    ports:
      - "${RAG_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8083/health', timeout=5).read()\""]
      interval: 15s
      timeout: 5s
      retries: 20
    depends_on:
      rag-db:
        condition: service_healthy

  parser:
    build:
      context: ./parser
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tender}:${POSTGRES_PASSWORD:-tender}@postgres:5432/${POSTGRES_DB:-tender}
      RAG_API_BASE: http://rag-api:8083
      DICTIONARIES_API_URL: http://backend:8082/api/v1/dictionaries?kind=keywords
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-1800}
      MAX_WORKERS: ${MAX_WORKERS:-4}
      HEADLESS: "true"
      DOWNLOAD_DIR: /app/downloads
      STRICT_KEYWORD_FILTER: ${STRICT_KEYWORD_FILTER:-false}
      COLLECT_ALL_ACTIVE_LOTS: ${COLLECT_ALL_ACTIVE_LOTS:-true}
      SMART_MATCH_ENABLED: "true"
      SMART_MATCH_USE_MORPHOLOGY: "true"
      SEMANTIC_MATCH_ENABLED: ${SEMANTIC_MATCH_ENABLED:-false}
      AI_LOT_FILTER_ENABLED: ${AI_LOT_FILTER_ENABLED:-false}
      STOP_AT_FIRST_SEEN_LOT: ${STOP_AT_FIRST_SEEN_LOT:-false}
      PROCESS_EXISTING_LOTS: ${PROCESS_EXISTING_LOTS:-true}
      MAX_LOTS_PER_CYCLE: ${MAX_LOTS_PER_CYCLE:-0}
      PLATFORMS: ${PLATFORMS:-goszakup}
      DEFAULT_KEYWORDS: ${DEFAULT_KEYWORDS:-}
      GOSZAKUP_BASE_URL: ${GOSZAKUP_BASE_URL:-https://goszakup.gov.kz}
      GOSZAKUP_SEARCH_URL: ${GOSZAKUP_SEARCH_URL:-https://goszakup.gov.kz/ru/search/lots}
      GOSZAKUP_LOTS_COUNT_RECORD: ${GOSZAKUP_LOTS_COUNT_RECORD:-50}
      GOSZAKUP_LOTS_MAX_PAGES: ${GOSZAKUP_LOTS_MAX_PAGES:-0}
      GOSZAKUP_OWS_TOKEN: ${GOSZAKUP_OWS_TOKEN:-}
      GOSZAKUP_OWS_BASE_URL: ${GOSZAKUP_OWS_BASE_URL:-https://ows.goszakup.gov.kz}
      GOSZAKUP_OWS_GRAPHQL_URL: ${GOSZAKUP_OWS_GRAPHQL_URL:-https://ows.goszakup.gov.kz/v3/graphql}
      ZAKUP_PUBLIC_BASE_URL: ${ZAKUP_PUBLIC_BASE_URL:-https://zakup.gov.kz}
      ZAKUP_LOTS_URL: ${ZAKUP_LOTS_URL:-https://zakup.gov.kz/home/lots}
      ZAKUP_LOTS_LIMIT: ${ZAKUP_LOTS_LIMIT:-100}
      ZAKUP_LOTS_MAX_PAGES: ${ZAKUP_LOTS_MAX_PAGES:-0}
      ZAKUP_LOTS_SYSTEM_IDS: ${ZAKUP_LOTS_SYSTEM_IDS:-}
      ZAKUP_OWS_LIMIT_PER_PAGE: ${ZAKUP_OWS_LIMIT_PER_PAGE:-200}
      ZAKUP_OWS_MAX_PAGES_PER_KEYWORD: ${ZAKUP_OWS_MAX_PAGES_PER_KEYWORD:-0}
      OUR_BINS: ${OUR_BINS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - parser_downloads:/app/downloads
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
      rag-api:
        condition: service_healthy

  frontend:
    build:
      context: ./tenderflow-admin
      args:
        VITE_BACK_API: ${PUBLIC_BACKEND_URL:-http://localhost:8082}
        VITE_LOCAL_API: ${PUBLIC_BACKEND_URL:-http://localhost:8082}
        VITE_RAG_API: ${PUBLIC_RAG_URL:-http://localhost:8083}
        VITE_FETCH_DOCUMENT_PROXY_URL: ${PUBLIC_BACKEND_URL:-http://localhost:8082}/api/v1/fetch-document
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  tender_postgres_data:
  rag_postgres_data:
  parser_downloads:
